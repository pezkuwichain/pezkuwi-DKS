[package]
name = "pez-minimal-template-runtime"
description = "A solochain runtime template built with Bizinikiwi, part of Pezkuwi Sdk."
version = "0.1.1"
license = "Unlicense"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
publish = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
codec = { workspace = true }
pezkuwi-sdk = { workspace = true, features = [
	"pezpallet-balances",
	"pezpallet-sudo",
	"pezpallet-timestamp",
	"pezpallet-transaction-payment",
	"pezpallet-transaction-payment-rpc-runtime-api",
	"pezsp-api",
	"pezsp-keyring",
	"runtime",
] }
scale-info = { workspace = true }
serde_json = { workspace = true, default-features = false, features = [
	"alloc",
] }

# local pezpallet templates
pezpallet-minimal-template = { workspace = true }

[build-dependencies]
pezkuwi-sdk = { optional = true, workspace = true, features = [
	"bizinikiwi-wasm-builder",
] }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezkuwi-sdk/std",
	"pezpallet-minimal-template/std",
	"scale-info/std",
	"serde_json/std",
]
runtime-benchmarks = [
	"pezkuwi-sdk/runtime-benchmarks",
	"pezpallet-minimal-template/runtime-benchmarks",
]
try-runtime = [
	"pezkuwi-sdk/try-runtime",
	"pezpallet-minimal-template/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
