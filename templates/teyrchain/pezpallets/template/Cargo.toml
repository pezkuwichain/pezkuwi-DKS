[package]
name = "pezpallet-teyrchain-template"
description = "FRAME pezpallet template for defining custom runtime logic."
version = "0.0.0"
license = "Unlicense"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
publish = false
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

pezframe = { workspace = true, default-features = false, features = [
	"experimental",
	"runtime",
] }
pezframe-support = { workspace = true, default-features = false }
pezframe-system = { workspace = true, default-features = false }

[features]
default = ["std"]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezframe/runtime-benchmarks",
]
std = [
	"codec/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezframe/std",
	"scale-info/std",
]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezframe/try-runtime",
]
serde = []
experimental = []
tuples-96 = []
