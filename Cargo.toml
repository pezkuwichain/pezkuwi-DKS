# Patch serde to fix wasm32v1-none compilation issues
# serde_core doesn't properly export prelude traits for this target
# See: https://github.com/pezkuwichain/serde/tree/fix-wasm32v1-none
[patch.crates-io]
serde = { git = "https://github.com/pezkuwichain/serde.git", branch = "fix-wasm32v1-none" }
serde_core = { git = "https://github.com/pezkuwichain/serde.git", branch = "fix-wasm32v1-none" }
# arrayvec 0.7.6 fails on wasm32v1-none: E0223 Self::Target/Self::IntoIter ambiguity
# (Rust 1.87+ Receiver trait) + missing prelude in char.rs on target_os=none.
# Vendored in-tree for a fully self-contained, reproducible build.
arrayvec = { path = "vendor/arrayvec" }
# core2 0.4.0 was yanked from crates.io; wasm sub-builds resolve deps without --locked.
# Vendored in-tree for a fully self-contained, reproducible build.
core2 = { path = "vendor/core2" }
