[package]
name = "pezpallet-xcm-precompiles"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Provides precompiles for `pezpallet-xcm`"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
tracing = { workspace = true }

pezframe-support = { workspace = true }
pezpallet-revive = { workspace = true }
pezpallet-xcm = { workspace = true }

xcm = { workspace = true }
xcm-executor = { workspace = true }

[dev-dependencies]
pezframe-system = { workspace = true, default-features = true }
pezkuwi-teyrchain-primitives = { workspace = true, default-features = true }
pezpallet-assets = { workspace = true, default-features = true }
pezpallet-balances = { workspace = true, default-features = true }
pezpallet-timestamp = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
scale-info = { workspace = true, default-features = true }
xcm-builder = { workspace = true, default-features = true }
xcm-pez-simulator = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezkuwi-teyrchain-primitives/std",
	"pezpallet-assets/std",
	"pezpallet-balances/std",
	"pezpallet-revive/std",
	"pezpallet-timestamp/std",
	"pezpallet-xcm/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"tracing/std",
	"xcm-builder/std",
	"xcm-executor/std",
	"xcm-pez-simulator/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezkuwi-teyrchain-primitives/runtime-benchmarks",
	"pezpallet-assets/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezpallet-revive/runtime-benchmarks",
	"pezpallet-timestamp/runtime-benchmarks",
	"pezpallet-xcm/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm-pez-simulator/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezkuwi-teyrchain-primitives/try-runtime",
	"pezpallet-assets/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezpallet-revive/try-runtime",
	"pezpallet-timestamp/try-runtime",
	"pezpallet-xcm/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm-pez-simulator/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
