[package]
name = "pezpallet-xcm"
version = "7.0.0"
description = "A pezpallet for handling XCM programs."
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
bounded-collections = { workspace = true }
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, features = [
	"derive",
], workspace = true, default-features = true }
tracing = { workspace = true }

pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }

xcm = { workspace = true }
xcm-builder = { workspace = true }
xcm-executor = { workspace = true }
xcm-runtime-pezapis = { workspace = true }

# marked optional, used in benchmarking
hex-literal = { workspace = true, default-features = false }
pezframe-benchmarking = { optional = true, workspace = true }
pezpallet-balances = { optional = true, workspace = true }

[dev-dependencies]
pezkuwi-runtime-teyrchains = { workspace = true, default-features = true }
pezkuwi-teyrchain-primitives = { workspace = true, default-features = true }
pezpallet-assets = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
xcm-pez-simulator = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"bounded-collections/std",
	"codec/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-balances/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"serde",
	"tracing/std",
	"xcm-builder/std",
	"xcm-executor/std",
	"xcm-pez-simulator/std",
	"xcm-runtime-pezapis/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezkuwi-runtime-teyrchains/runtime-benchmarks",
	"pezkuwi-teyrchain-primitives/runtime-benchmarks",
	"pezpallet-assets/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm-pez-simulator/runtime-benchmarks",
	"xcm-runtime-pezapis/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
test-utils = ["std"]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezkuwi-runtime-teyrchains/try-runtime",
	"pezkuwi-teyrchain-primitives/try-runtime",
	"pezpallet-assets/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm-pez-simulator/try-runtime",
	"xcm-runtime-pezapis/try-runtime",
	"xcm/try-runtime",
]
serde = [
	"bounded-collections/serde",
	"codec/serde",
	"dep:serde",
	"pezframe-benchmarking?/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
experimental = []
with-tracing = []
tuples-96 = []
