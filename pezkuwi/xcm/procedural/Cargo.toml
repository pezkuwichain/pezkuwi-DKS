[package]
name = "xcm-pez-procedural"
description = "Procedural macros for XCM"
authors.workspace = true
edition.workspace = true
license.workspace = true
version = "7.0.0"
publish = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[lib]
proc-macro = true

[dependencies]
Inflector = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true }

[dev-dependencies]
trybuild = { features = ["diff"], workspace = true }
# NOTE: we have to explicitly specify `std` because of trybuild
xcm = { workspace = true, default-features = true, features = ["std"] }
# For testing macros.
pezframe-support = { workspace = true }

[features]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
std = ["pezframe-support/std"]
try-runtime = ["pezframe-support/try-runtime", "xcm/try-runtime"]
experimental = []
tuples-96 = []
