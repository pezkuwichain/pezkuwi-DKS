[package]
name = "xcm-pez-simulator-example"
description = "Examples of xcm-pez-simulator usage."
authors.workspace = true
edition.workspace = true
license.workspace = true
version = "7.0.0"
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
codec = { workspace = true, default-features = true }
scale-info = { features = [
	"derive",
], workspace = true, default-features = true }
tracing = { workspace = true }

pezframe-support = { workspace = true, default-features = true }
pezframe-system = { workspace = true, default-features = true }
pezpallet-balances = { workspace = true, default-features = true }
pezpallet-message-queue = { workspace = true, default-features = true }
pezpallet-uniques = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }

pezkuwi-runtime-teyrchains = { workspace = true, default-features = true }
pezkuwi-teyrchain-primitives = { workspace = true, default-features = true }
pezpallet-xcm = { workspace = true, default-features = true }
xcm = { workspace = true, default-features = true }
xcm-builder = { workspace = true, default-features = true }
xcm-executor = { workspace = true, default-features = true }
xcm-pez-simulator = { workspace = true, default-features = true }

[dev-dependencies]
pezsp-tracing = { workspace = true }

[features]
default = []
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezkuwi-runtime-teyrchains/runtime-benchmarks",
	"pezkuwi-teyrchain-primitives/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezpallet-message-queue/runtime-benchmarks",
	"pezpallet-uniques/runtime-benchmarks",
	"pezpallet-xcm/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm-pez-simulator/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
std = ["tracing/std", "xcm-pez-simulator/std"]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezkuwi-runtime-teyrchains/try-runtime",
	"pezkuwi-teyrchain-primitives/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezpallet-message-queue/try-runtime",
	"pezpallet-uniques/try-runtime",
	"pezpallet-xcm/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm-pez-simulator/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
