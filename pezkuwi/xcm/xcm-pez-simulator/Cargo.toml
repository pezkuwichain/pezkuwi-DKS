[package]
name = "xcm-pez-simulator"
description = "Test kit to simulate cross-chain message passing and XCM execution"
version = "7.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
codec = { workspace = true, default-features = true }
paste = { workspace = true, default-features = true }
scale-info = { workspace = true }

pezframe-support = { workspace = true, default-features = true }
pezframe-system = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }

pezkuwi-core-primitives = { workspace = true, default-features = true }
pezkuwi-primitives = { workspace = true, default-features = true }
pezkuwi-runtime-teyrchains = { workspace = true, default-features = true }
pezkuwi-teyrchain-primitives = { workspace = true, default-features = true }
xcm = { workspace = true, default-features = true }
xcm-builder = { workspace = true, default-features = true }
xcm-executor = { workspace = true, default-features = true }

[features]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezkuwi-core-primitives/runtime-benchmarks",
	"pezkuwi-primitives/runtime-benchmarks",
	"pezkuwi-runtime-teyrchains/runtime-benchmarks",
	"pezkuwi-teyrchain-primitives/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
std = ["scale-info/std"]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezkuwi-core-primitives/try-runtime",
	"pezkuwi-primitives/try-runtime",
	"pezkuwi-runtime-teyrchains/try-runtime",
	"pezkuwi-teyrchain-primitives/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
