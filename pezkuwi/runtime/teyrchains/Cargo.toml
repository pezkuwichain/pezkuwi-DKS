[package]
name = "pezkuwi-runtime-teyrchains"
version = "7.0.0"
description = "Relay Chain runtime code responsible for Teyrchains."
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
bitflags = { workspace = true }
bitvec = { features = ["alloc"], workspace = true }
codec = { features = ["derive", "max-encoded-len"], workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }

pezsp-api = { workspace = true }
pezsp-application-crypto = { optional = true, workspace = true }
pezsp-arithmetic = { workspace = true }
pezsp-core = { features = ["serde"], workspace = true }
pezsp-inherents = { workspace = true }
pezsp-io = { workspace = true }
pezsp-keystore = { optional = true, workspace = true }
pezsp-runtime = { features = ["serde"], workspace = true }
pezsp-session = { workspace = true }
pezsp-staking = { features = ["serde"], workspace = true }
pezsp-std = { workspace = true, optional = true }
pezsp-tracing = { optional = true, workspace = true }

pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezpallet-authority-discovery = { workspace = true }
pezpallet-authorship = { workspace = true }
pezpallet-babe = { workspace = true }
pezpallet-balances = { workspace = true }
pezpallet-broker = { workspace = true }
pezpallet-message-queue = { workspace = true }
pezpallet-mmr = { workspace = true, optional = true }
pezpallet-session = { workspace = true }
pezpallet-staking = { workspace = true }
pezpallet-timestamp = { workspace = true }

# only used in benchmarking
pezframe-election-provider-support = { workspace = true, optional = true }

pezkuwi-primitives = { workspace = true }
xcm = { workspace = true }
xcm-executor = { workspace = true }

pezkuwi-core-primitives = { workspace = true }
pezkuwi-runtime-metrics = { workspace = true }
pezkuwi-teyrchain-primitives = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
static_assertions = { optional = true, workspace = true, default-features = true }

[dev-dependencies]
assert_matches = { workspace = true }
hex-literal = { workspace = true, default-features = true }
pezframe-support-test = { workspace = true }
pezkuwi-primitives = { workspace = true, features = ["test"] }
pezkuwi-primitives-test-helpers = { workspace = true }
pezsc-keystore = { workspace = true, default-features = true }
pezsp-crypto-hashing = { workspace = true, default-features = true }
pezsp-keyring = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
pretty_assertions = { workspace = true }
rstest = { workspace = true }
serde_json = { workspace = true, default-features = true }
thousands = { workspace = true }

[features]
default = ["std"]
no_std = []
std = [
	"bitvec/std",
	"codec/std",
	"log/std",
	"pezframe-benchmarking?/std",
	"pezframe-election-provider-support?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezkuwi-core-primitives/std",
	"pezkuwi-primitives-test-helpers/std",
	"pezkuwi-primitives/std",
	"pezkuwi-runtime-metrics/std",
	"pezkuwi-teyrchain-primitives/std",
	"pezpallet-authority-discovery/std",
	"pezpallet-authorship/std",
	"pezpallet-babe/std",
	"pezpallet-balances/std",
	"pezpallet-broker/std",
	"pezpallet-message-queue/std",
	"pezpallet-mmr?/std",
	"pezpallet-session/std",
