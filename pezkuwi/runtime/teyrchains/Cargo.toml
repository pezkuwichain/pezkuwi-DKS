	"pezsp-io/std",
	"pezsp-keystore",
	"pezsp-keystore?/std",
	"pezsp-runtime/std",
	"pezsp-session/std",
	"pezsp-staking/std",
	"pezsp-std?/std",
	"rand/std",
	"rand_chacha/std",
	"scale-info/std",
	"serde/std",
	"xcm-executor/std",
	"xcm/std",
]
runtime-benchmarks = [
