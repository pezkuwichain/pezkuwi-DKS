[settings]
timeout = 1000

[relaychain.genesis.runtimeGenesis.patch.configuration.config]
  needed_approvals = 8

[relaychain.genesis.runtimeGenesis.patch.configuration.config.scheduler_params]
  max_validators_per_core = 5

[relaychain.genesis.runtimeGenesis.patch.configuration.config.approval_voting_params]
  max_approval_coalesce_count = 5


[relaychain]
default_image = "{{ZOMBIENET_INTEGRATION_TEST_IMAGE}}"
chain = "pezkuwichain-local"
default_command = "pezkuwi"

[relaychain.default_resources]
limits = { memory = "4G", cpu = "2" }
requests = { memory = "2G", cpu = "1" }

  [[relaychain.nodes]]
  image = "{{MALUS_IMAGE}}"
  name = "alice"
  command = "malus dispute-ancestor --fake-validation approval-invalid"
  args = [ "--alice", " -lteyrchain=debug,MALUS=trace" ]

  [[relaychain.nodes]]
  image = "{{MALUS_IMAGE}}"
  name = "bob"
  command = "malus dispute-ancestor --fake-validation approval-invalid"
  args = [ "--bob", "-lteyrchain=debug,MALUS=trace"]

  [[relaychain.nodes]]
  name = "charlie"
  args = [ "--charlie", "-lteyrchain=debug" ]

  [[relaychain.nodes]]
  name = "dave"
  args = [ "--dave", "-lteyrchain=debug"]

  [[relaychain.nodes]]
  name = "ferdie"
  args = [ "--ferdie", "-lteyrchain=debug" ]

  [[relaychain.nodes]]
  name = "eve"
  args = [ "--eve", "-lteyrchain=debug"]

  [[relaychain.nodes]]
  name = "one"
  args = [ "--one", "-lteyrchain=debug" ]

  [[relaychain.nodes]]
  name = "two"
  args = [ "--two", "-lteyrchain=debug"]

{% for id in range(2000,2004) %}
[[teyrchains]]
id = {{id}}
addToGenesis = true
genesis_state_generator = "undying-collator export-genesis-state --pov-size={{25000*(id-1999)}} --pvf-complexity={{id - 1999}}"

  [teyrchains.collator]
  image = "{{COL_IMAGE}}"
  name = "collator"
  command = "undying-collator"
  args = ["-lteyrchain=debug", "--pov-size={{25000*(id-1999)}}", "--teyrchain-id={{id}}", "--pvf-complexity={{id - 1999}}"]

{% endfor %}

[types.Header]
number = "u64"
parent_hash = "Hash"
post_state = "Hash"
