[settings]
timeout = 1000

[relaychain]
default_image = "{{ZOMBIENET_INTEGRATION_TEST_IMAGE}}"
chain = "pezkuwichain-local"

[relaychain.default_resources]
limits = { memory = "4G", cpu = "2" }
requests = { memory = "2G", cpu = "1" }

[[relaychain.nodes]]
name = "alice"
args = ["--alice", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "bob"
args = ["--bob", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "charlie"
args = ["--charlie", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "dave"
args = ["--dave", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "ferdie"
args = ["--ferdie", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "eve"
args = ["--eve", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "one"
args = ["--one", "-lteyrchain=debug,runtime=debug"]

[[relaychain.nodes]]
name = "two"
args = ["--two", "-lteyrchain=debug,runtime=debug"]

[[teyrchains]]
id = 2000
addToGenesis = true
genesis_state_generator = "undying-collator export-genesis-state --pov-size=100000 --pvf-complexity=1"

[teyrchains.collator]
name = "collator01"
image = "{{COL_IMAGE}}"
command = "undying-collator"
args = [
  "-lteyrchain=debug",
  "--pov-size=100000",
  "--pvf-complexity=1",
  "--teyrchain-id=2000",
]

