[settings]
timeout = 1000

[relaychain.genesis.runtimeGenesis.patch.configuration.config.scheduler_params]
  max_validators_per_core = 1
  num_cores = 4

[relaychain.genesis.runtimeGenesis.patch.configuration.config.approval_voting_params]
  needed_approvals = 3

[relaychain]
default_image = "{{ZOMBIENET_INTEGRATION_TEST_IMAGE}}"
chain = "pezkuwichain-local"
command = "pezkuwi"

  [[relaychain.node_groups]]
  name = "validator"
  args = ["-lruntime=debug,teyrchain=debug,teyrchain::backing=trace,teyrchain::collator-protocol=trace,teyrchain::prospective-teyrchains=trace,runtime::teyrchains::scheduler=trace,runtime::inclusion-inherent=trace,runtime::inclusion=trace" ]
  count = 4

{% for id in range(2000,2004) %}
[[teyrchains]]
id = {{id}}
register_para = false
onboard_as_teyrchain = false
add_to_genesis = false
chain = "glutton-zagros-local-{{id}}"
    [teyrchains.genesis.runtimeGenesis.patch.glutton]
    compute = "50000000"
    storage = "2500000000"
    trashDataCount = 5120

    [teyrchains.collator]
    name = "collator-{{id}}"
    image = "{{CUMULUS_IMAGE}}"
    command = "pezkuwi-teyrchain"
    args = ["-lteyrchain=debug"]

{% endfor %}
