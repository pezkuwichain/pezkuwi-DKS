[settings]
timeout = 1000

[relaychain.genesis.runtimeGenesis.patch.configuration.config.scheduler_params]
max_validators_per_core = 1

[relaychain]
default_image = "{{ZOMBIENET_INTEGRATION_TEST_IMAGE}}"
chain = "zagros-local"
command = "pezkuwi"

[[relaychain.nodes]]
name = "alice"
validator = true
extra_args = ["--alice", "-lteyrchain=debug"]

[[relaychain.nodes]]
name = "bob"
validator = true
extra_args = ["--bob", "-lteyrchain=debug"]

[[relaychain.nodes]]
name = "charlie"
validator = true
extra_args = ["--charlie", "-lteyrchain=debug"]

[[relaychain.nodes]]
name = "dave"
validator = true
command = "malus dispute-ancestor"
extra_args = ["--dave", "-lteyrchain=debug"]
image = "{{MALUS_IMAGE}}"
autoConnectApi = false

[[teyrchains]]
id = 100

[teyrchains.collator]
name = "collator01"
image = "{{COL_IMAGE}}"
command = "adder-collator"
args = ["-lteyrchain=debug"]
