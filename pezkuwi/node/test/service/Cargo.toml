[package]
name = "pezkuwi-test-service"
publish = false
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "Pezkuwi SDK relay chain component: test service"
documentation.workspace = true
repository = { workspace = true }
homepage = { workspace = true }

[lints]
workspace = true

[dependencies]
futures = { workspace = true }
rand = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
tokio = { workspace = true, default-features = true }

# Pezkuwi dependencies
pezkuwi-node-subsystem = { workspace = true, default-features = true }
pezkuwi-overseer = { workspace = true, default-features = true }
pezkuwi-pez-node-primitives = { workspace = true, default-features = true }
pezkuwi-primitives = { workspace = true, default-features = true }
pezkuwi-runtime-common = { workspace = true, default-features = true }
pezkuwi-runtime-teyrchains = { workspace = true, default-features = true }
pezkuwi-service = { workspace = true, default-features = true }
pezkuwi-test-runtime = { workspace = true }
pezkuwi-teyrchain-primitives = { workspace = true, default-features = true }
peztest-runtime-constants = { workspace = true, default-features = true }

# Bizinikiwi dependencies
bizinikiwi-test-client = { workspace = true }
pezframe-system = { workspace = true, default-features = true }
pezpallet-balances = { workspace = true, default-features = true }
pezpallet-staking = { workspace = true, default-features = true }
pezpallet-transaction-payment = { workspace = true, default-features = true }
pezsc-chain-spec = { workspace = true, default-features = true }
pezsc-cli = { workspace = true, default-features = true }
pezsc-client-api = { workspace = true, default-features = true }
pezsc-consensus = { workspace = true, default-features = true }
pezsc-consensus-grandpa = { workspace = true, default-features = true }
pezsc-network = { workspace = true, default-features = true }
pezsc-service = { workspace = true }
pezsc-tracing = { workspace = true, default-features = true }
pezsp-arithmetic = { workspace = true, default-features = true }
pezsp-authority-discovery = { workspace = true, default-features = true }
pezsp-blockchain = { workspace = true, default-features = true }
pezsp-consensus = { workspace = true, default-features = true }
pezsp-consensus-babe = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-keyring = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
pezsp-state-machine = { workspace = true, default-features = true }

[dev-dependencies]
pezpallet-balances = { workspace = true }
tokio = { features = ["macros"], workspace = true, default-features = true }

