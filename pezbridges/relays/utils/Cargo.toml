[package]
name = "relay-utils"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
repository.workspace = true
publish = false
description = "Pezkuwi SDK component: relay utils"
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true, default-features = true }
async-std = { workspace = true }
async-trait = { workspace = true }
backoff = { workspace = true }
futures = { workspace = true }
# Using reqwest with rustls-tls for pure Rust TLS (no OpenSSL dependency)
jsonpath_lib = { workspace = true }
num-traits = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
reqwest = { workspace = true }
serde_json = { workspace = true, default-features = true }
sysinfo = { workspace = true }
thiserror = { workspace = true }
time = { features = ["formatting", "local-offset", "std"], workspace = true }
tokio = { features = ["rt"], workspace = true, default-features = true }
tracing = { workspace = true }

# Bridge dependencies
pezbp-runtime = { workspace = true, default-features = true }

# Bizinikiwi dependencies
pezsp-runtime = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }

[features]
runtime-benchmarks = [
	"pezbp-runtime/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
std = ["prometheus-endpoint/std", "tracing/std"]
try-runtime = ["pezbp-runtime/try-runtime", "pezsp-runtime/try-runtime"]
serde = []
with-tracing = []
