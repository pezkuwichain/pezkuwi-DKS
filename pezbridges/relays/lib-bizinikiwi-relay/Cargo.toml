[package]
name = "bizinikiwi-relay-helper"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
repository.workspace = true
publish = false
description = "Bizinikiwi utility: relay helper"
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
async-std = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true, features = ["derive"] }
codec = { workspace = true, default-features = true }
futures = { workspace = true }
hex = { workspace = true, default-features = true }
num-traits = { workspace = true, default-features = true }
rbtag = { workspace = true }
strum = { features = ["derive"], workspace = true, default-features = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Bridge dependencies
pezbp-header-pez-chain = { workspace = true, default-features = true }
pezbp-pezkuwi-core = { workspace = true, default-features = true }
pezbp-relayers = { workspace = true, default-features = true }
pezbp-teyrchains = { workspace = true, default-features = true }

pez-equivocation-detector = { workspace = true }
pez-finality-relay = { workspace = true }
pez-messages-relay = { workspace = true }
relay-bizinikiwi-client = { workspace = true }
relay-utils = { workspace = true }
teyrchains-relay = { workspace = true }

pezpallet-bridge-grandpa = { workspace = true, default-features = true }
pezpallet-bridge-messages = { workspace = true, default-features = true }
pezpallet-bridge-teyrchains = { workspace = true, default-features = true }

pezbp-messages = { workspace = true, default-features = true }
pezbp-runtime = { workspace = true, default-features = true }

# Bizinikiwi Dependencies
pezframe-support = { workspace = true, default-features = true }
pezframe-system = { workspace = true, default-features = true }
pezpallet-balances = { workspace = true, default-features = true }
pezpallet-grandpa = { workspace = true, default-features = true }
pezsp-consensus-grandpa = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
pezsp-trie = { workspace = true }

[dev-dependencies]
relay-bizinikiwi-client = { features = ["test-helpers"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

[features]
runtime-benchmarks = [
	"pez-equivocation-detector/runtime-benchmarks",
	"pez-finality-relay/runtime-benchmarks",
	"pez-messages-relay/runtime-benchmarks",
	"pezbp-header-pez-chain/runtime-benchmarks",
	"pezbp-messages/runtime-benchmarks",
	"pezbp-pezkuwi-core/runtime-benchmarks",
	"pezbp-relayers/runtime-benchmarks",
	"pezbp-runtime/runtime-benchmarks",
	"pezbp-teyrchains/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezpallet-bridge-grandpa/runtime-benchmarks",
	"pezpallet-bridge-messages/runtime-benchmarks",
	"pezpallet-bridge-teyrchains/runtime-benchmarks",
	"pezpallet-grandpa/runtime-benchmarks",
	"pezsp-consensus-grandpa/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-trie/runtime-benchmarks",
	"relay-bizinikiwi-client/runtime-benchmarks",
	"relay-utils/runtime-benchmarks",
	"teyrchains-relay/runtime-benchmarks",
]
std = [
	"anyhow/std",
	"pez-equivocation-detector/std",
	"pez-finality-relay/std",
	"pez-messages-relay/std",
	"pezsp-trie/std",
	"relay-bizinikiwi-client/std",
	"relay-utils/std",
	"scale-info/std",
	"teyrchains-relay/std",
	"tracing/std",
]
try-runtime = [
	"pezbp-header-pez-chain/try-runtime",
	"pezbp-messages/try-runtime",
	"pezbp-pezkuwi-core/try-runtime",
	"pezbp-relayers/try-runtime",
	"pezbp-runtime/try-runtime",
	"pezbp-teyrchains/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezpallet-bridge-grandpa/try-runtime",
	"pezpallet-bridge-messages/try-runtime",
	"pezpallet-bridge-teyrchains/try-runtime",
	"pezpallet-grandpa/try-runtime",
	"pezsp-consensus-grandpa/try-runtime",
	"pezsp-runtime/try-runtime",
	"relay-bizinikiwi-client/try-runtime",
	"relay-utils/try-runtime",
]
serde = []
experimental = []
tuples-96 = []
