[package]
name = "pezsnowbridge-pezpallet-outbound-queue-v2"
description = "Snowbridge Outbound Queue Pallet V2"
version = "0.2.0"
authors = ["Snowfork <contact@snowfork.com>"]
edition.workspace = true
repository.workspace = true
license = "Apache-2.0"
categories = ["cryptography::cryptocurrencies"]
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[package.metadata.pezkuwi-sdk]
exclude-from-umbrella = true

[dependencies]
alloy-core = { workspace = true, features = ["sol-types"] }
codec = { features = ["derive"], workspace = true }
ethabi = { workspace = true }
hex-literal = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }

pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-arithmetic = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }

pezbp-relayers = { workspace = true }

pezsnowbridge-beacon-primitives = { workspace = true }
pezsnowbridge-core = { workspace = true }
pezsnowbridge-merkle-tree = { workspace = true }
pezsnowbridge-outbound-queue-primitives = { workspace = true }
pezsnowbridge-verification-primitives = { workspace = true }

xcm = { workspace = true }
xcm-builder = { workspace = true }
xcm-executor = { workspace = true }

[dev-dependencies]
pezpallet-message-queue = { workspace = true }
pezsnowbridge-test-utils = { workspace = true }

[features]
default = ["std"]
std = [
	"alloy-core/std",
	"codec/std",
	"ethabi/std",
	"pezbp-relayers/std",
	"pezframe-benchmarking/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-message-queue/std",
	"pezsnowbridge-beacon-primitives/std",
	"pezsnowbridge-core/std",
	"pezsnowbridge-merkle-tree/std",
	"pezsnowbridge-outbound-queue-primitives/std",
	"pezsnowbridge-test-utils/std",
	"pezsnowbridge-verification-primitives/std",
	"pezsp-arithmetic/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"scale-info/std",
	"serde/std",
	"xcm-builder/std",
	"xcm-executor/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezbp-relayers/runtime-benchmarks",
	"pezframe-benchmarking",
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-message-queue/runtime-benchmarks",
	"pezsnowbridge-beacon-primitives/runtime-benchmarks",
	"pezsnowbridge-core/runtime-benchmarks",
	"pezsnowbridge-merkle-tree/runtime-benchmarks",
	"pezsnowbridge-outbound-queue-primitives/runtime-benchmarks",
	"pezsnowbridge-test-utils/runtime-benchmarks",
	"pezsnowbridge-verification-primitives/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezbp-relayers/try-runtime",
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-message-queue/try-runtime",
	"pezsnowbridge-beacon-primitives/try-runtime",
	"pezsnowbridge-core/try-runtime",
	"pezsnowbridge-merkle-tree/try-runtime",
	"pezsnowbridge-outbound-queue-primitives/try-runtime",
	"pezsnowbridge-test-utils/try-runtime",
	"pezsnowbridge-verification-primitives/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
