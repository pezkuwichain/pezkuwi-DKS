[package]
name = "pezsnowbridge-outbound-queue-v2-runtime-api"
description = "Snowbridge Outbound Queue Runtime API V2"
version = "0.2.0"
authors = ["Snowfork <contact@snowfork.com>"]
edition.workspace = true
repository.workspace = true
license = "Apache-2.0"
categories = ["cryptography::cryptocurrencies"]
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[package.metadata.pezkuwi-sdk]
exclude-from-umbrella = true

[dependencies]
codec = { features = ["derive"], workspace = true }
pezframe-support = { workspace = true }
pezsnowbridge-merkle-tree = { workspace = true }
pezsp-api = { workspace = true }
pezsp-std = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezframe-support/std",
	"pezsnowbridge-merkle-tree/std",
	"pezsp-api/std",
	"pezsp-std/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezsnowbridge-merkle-tree/runtime-benchmarks",
	"pezsp-api/runtime-benchmarks",
]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezsnowbridge-merkle-tree/try-runtime",
	"pezsp-api/try-runtime",
]
serde = []
experimental = []
tuples-96 = []
