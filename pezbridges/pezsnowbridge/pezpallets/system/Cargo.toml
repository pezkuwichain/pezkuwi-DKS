[package]
name = "pezsnowbridge-pezpallet-system"
description = "Snowbridge System Pallet"
version = "0.2.0"
authors = ["Snowfork <contact@snowfork.com>"]
edition.workspace = true
repository.workspace = true
license = "Apache-2.0"
categories = ["cryptography::cryptocurrencies"]
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[package.metadata.pezkuwi-sdk]
exclude-from-umbrella = true

[dependencies]
codec = { features = ["derive"], workspace = true }
pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
tracing = { workspace = true }

pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }

xcm = { workspace = true }
xcm-executor = { workspace = true }

pezsnowbridge-core = { workspace = true }
pezsnowbridge-outbound-queue-primitives = { workspace = true }

[dev-dependencies]
hex = { workspace = true, default-features = true }
hex-literal = { workspace = true, default-features = true }
pezkuwi-primitives = { workspace = true, default-features = true }
pezpallet-balances = { workspace = true, default-features = true }
pezpallet-message-queue = { workspace = true, default-features = true }
pezsnowbridge-pezpallet-outbound-queue = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsnowbridge-core/std",
	"pezsnowbridge-outbound-queue-primitives/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"scale-info/std",
	"tracing/std",
	"xcm-executor/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezkuwi-primitives/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezpallet-message-queue/runtime-benchmarks",
	"pezsnowbridge-core/runtime-benchmarks",
	"pezsnowbridge-outbound-queue-primitives/runtime-benchmarks",
	"pezsnowbridge-pezpallet-outbound-queue/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezkuwi-primitives/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezpallet-message-queue/try-runtime",
	"pezsnowbridge-core/try-runtime",
	"pezsnowbridge-outbound-queue-primitives/try-runtime",
	"pezsnowbridge-pezpallet-outbound-queue/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
