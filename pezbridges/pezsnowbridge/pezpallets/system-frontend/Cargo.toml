[package]
name = "pezsnowbridge-pezpallet-system-frontend"
description = "Snowbridge System Frontend Pallet"
version = "0.2.0"
authors = ["Snowfork <contact@snowfork.com>"]
edition.workspace = true
repository.workspace = true
license = "Apache-2.0"
categories = ["cryptography::cryptocurrencies"]
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[package.metadata.pezkuwi-sdk]
exclude-from-umbrella = true

[dependencies]
codec = { features = ["derive"], workspace = true }
pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezpallet-asset-conversion = { workspace = true }
pezsnowbridge-core = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
tracing = { workspace = true }
xcm = { workspace = true }
xcm-executor = { workspace = true }

[dev-dependencies]
pezpallet-balances = { workspace = true, default-features = true }
pezsnowbridge-test-utils = { workspace = true }
pezsp-keyring = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-asset-conversion/std",
	"pezsnowbridge-core/std",
	"pezsnowbridge-test-utils/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-keyring/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"scale-info/std",
	"tracing/std",
	"xcm-executor/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-asset-conversion/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezsnowbridge-core/runtime-benchmarks",
	"pezsnowbridge-test-utils/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-keyring/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-asset-conversion/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezsnowbridge-core/try-runtime",
	"pezsnowbridge-test-utils/try-runtime",
	"pezsp-keyring/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
