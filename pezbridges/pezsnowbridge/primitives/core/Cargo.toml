[package]
name = "pezsnowbridge-core"
description = "Snowbridge Core"
version = "0.2.0"
authors = ["Snowfork <contact@snowfork.com>"]
edition.workspace = true
repository.workspace = true
license = "Apache-2.0"
categories = ["cryptography::cryptocurrencies"]
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[package.metadata.pezkuwi-sdk]
exclude-from-umbrella = true

[dependencies]
codec = { workspace = true }
hex-literal = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, features = ["alloc", "derive"], workspace = true }
tracing = { workspace = true }

pezkuwi-teyrchain-primitives = { workspace = true }
xcm = { workspace = true }
xcm-builder = { workspace = true }

pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-arithmetic = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }
xcm-executor = { workspace = true }

pezbp-relayers = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezbp-relayers/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezkuwi-teyrchain-primitives/std",
	"pezsp-arithmetic/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"scale-info/std",
	"serde/std",
	"tracing/std",
	"xcm-builder/std",
	"xcm-executor/std",
	"xcm/std",
]
serde = [
	"codec/serde",
	"dep:serde",
	"pezsp-arithmetic/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = [
	"pezbp-relayers/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezkuwi-teyrchain-primitives/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezbp-relayers/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezkuwi-teyrchain-primitives/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
experimental = []
with-tracing = []
tuples-96 = []
