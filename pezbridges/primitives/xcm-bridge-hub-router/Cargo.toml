[package]
name = "pezbp-xcm-bridge-hub-router"
description = "Primitives of the xcm-bridge-hub fee pezpallet."
version = "0.7.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
repository.workspace = true
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[dependencies]
codec = { features = ["bit-vec", "derive"], workspace = true }
scale-info = { features = ["bit-vec", "derive"], workspace = true }

# Bizinikiwi Dependencies
pezsp-core = { workspace = true }
pezsp-runtime = { workspace = true }

# Pezkuwi Dependencies
xcm = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezsp-core/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezsp-runtime/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = ["pezsp-runtime/try-runtime", "xcm/try-runtime"]
serde = []
