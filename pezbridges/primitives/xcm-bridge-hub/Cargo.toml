[package]
name = "pezbp-xcm-bridge-hub"
description = "Primitives of the xcm-bridge-hub pezpallet."
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
repository.workspace = true
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }

# Bridge Dependencies
pezbp-messages = { workspace = true }
pezbp-runtime = { workspace = true }

# Bizinikiwi Dependencies
pezframe-support = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-std = { workspace = true }

# Pezkuwi Dependencies
xcm = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezbp-messages/std",
	"pezbp-runtime/std",
	"pezframe-support/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-std/std",
	"scale-info/std",
	"serde/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezbp-messages/runtime-benchmarks",
	"pezbp-runtime/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezbp-messages/try-runtime",
	"pezbp-runtime/try-runtime",
	"pezframe-support/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
