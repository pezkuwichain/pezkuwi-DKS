[package]
name = "pezbp-messages"
description = "Primitives of messages module."
version = "0.7.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
repository.workspace = true
documentation.workspace = true
homepage = { workspace = true }

[lints]
workspace = true

[dependencies]
codec = { features = ["bit-vec", "derive"], workspace = true }
scale-info = { features = ["bit-vec", "derive"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }

# Bridge dependencies
pezbp-header-pez-chain = { workspace = true }
pezbp-runtime = { workspace = true }

# Bizinikiwi Dependencies
pezframe-support = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-std = { workspace = true }

[dev-dependencies]
hex = { workspace = true, default-features = true }
hex-literal = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezbp-header-pez-chain/std",
	"pezbp-runtime/std",
	"pezframe-support/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-std/std",
	"scale-info/std",
	"serde/std",
]
runtime-benchmarks = [
	"pezbp-header-pez-chain/runtime-benchmarks",
	"pezbp-runtime/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
]
try-runtime = [
	"pezbp-header-pez-chain/try-runtime",
	"pezbp-runtime/try-runtime",
	"pezframe-support/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
