[toolchain]
# Latest stable Rust. Rust 1.96 removed the implicit `--allow-undefined` from
# wasm linking; the runtime wasm build restores it via WASM_BUILD_RUSTFLAGS in
# .cargo/config.toml so host-function imports (`ext_*`) link correctly. The
# resulting runtime WASM is import-identical to prior toolchains.
channel = "1.96.0"
components = ["rustfmt", "clippy", "rust-src"]
targets = ["wasm32v1-none", "wasm32-unknown-unknown"]
profile = "minimal"
