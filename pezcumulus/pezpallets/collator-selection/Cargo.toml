[package]
authors.workspace = true
description = "Simple pezpallet to select collators for a teyrchain."
edition.workspace = true
homepage.workspace = true
license = "Apache-2.0"
name = "pezpallet-collator-selection"
readme = "README.md"
repository.workspace = true
version = "9.0.0"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
log = { workspace = true }
rand = { features = ["std_rng"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezpallet-authorship = { workspace = true }
pezpallet-balances = { workspace = true }
pezpallet-session = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-staking = { workspace = true }

pezframe-benchmarking = { optional = true, workspace = true }

[dev-dependencies]
pezpallet-aura = { workspace = true, default-features = true }
pezpallet-timestamp = { workspace = true, default-features = true }
pezsp-consensus-aura = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }

[features]
default = ["std"]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-aura/runtime-benchmarks",
	"pezpallet-authorship/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezpallet-session/runtime-benchmarks",
	"pezpallet-timestamp/runtime-benchmarks",
	"pezsp-consensus-aura/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-staking/runtime-benchmarks",
]
std = [
	"codec/std",
	"log/std",
	"pezframe-benchmarking/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-authorship/std",
	"pezpallet-balances/std",
	"pezpallet-session/std",
	"pezsp-runtime/std",
	"pezsp-staking/std",
	"rand/std",
	"scale-info/std",
]

try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-aura/try-runtime",
	"pezpallet-authorship/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezpallet-session/try-runtime",
	"pezpallet-timestamp/try-runtime",
	"pezsp-consensus-aura/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-staking/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
