[package]
name = "pezcumulus-pezpallet-weight-reclaim"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "pezpallet and transaction extensions for accurate proof size reclaim"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# Bizinikiwi dependencies
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-trie = { workspace = true }

pezcumulus-primitives-storage-weight-reclaim = { workspace = true }
pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }

# Other dependencies
codec = { features = ["derive"], workspace = true }
derive-where = { workspace = true }
docify = { workspace = true }
log = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
pezcumulus-primitives-proof-size-hostfunction = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"pezcumulus-primitives-proof-size-hostfunction/std",
	"pezcumulus-primitives-storage-weight-reclaim/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-trie/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"pezcumulus-primitives-proof-size-hostfunction/runtime-benchmarks",
	"pezcumulus-primitives-storage-weight-reclaim/runtime-benchmarks",
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-trie/runtime-benchmarks",
]
try-runtime = [
	"pezcumulus-primitives-storage-weight-reclaim/try-runtime",
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezsp-runtime/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
