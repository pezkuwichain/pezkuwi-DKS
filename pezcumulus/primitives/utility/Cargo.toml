[package]
name = "pezcumulus-primitives-utility"
version = "0.7.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
description = "Helper datatypes for Pezcumulus"
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
log = { workspace = true }

# Bizinikiwi
pezframe-support = { workspace = true }
pezpallet-asset-conversion = { workspace = true }
pezsp-runtime = { workspace = true }

# Pezkuwi
pezkuwi-runtime-common = { workspace = true }
xcm = { workspace = true }
xcm-builder = { workspace = true }
xcm-executor = { workspace = true }

# Pezcumulus
pezcumulus-primitives-core = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"pezcumulus-primitives-core/std",
	"pezframe-support/std",
	"pezkuwi-runtime-common/std",
	"pezpallet-asset-conversion/std",
	"pezsp-runtime/std",
	"xcm-builder/std",
	"xcm-executor/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezcumulus-primitives-core/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezkuwi-runtime-common/runtime-benchmarks",
	"pezpallet-asset-conversion/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezcumulus-primitives-core/try-runtime",
	"pezframe-support/try-runtime",
	"pezkuwi-runtime-common/try-runtime",
	"pezpallet-asset-conversion/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
tuples-96 = []
