[package]
authors.workspace = true
edition.workspace = true
name = "pezcumulus-ping"
version = "0.7.0"
license = "Apache-2.0"
description = "Ping Pallet for Pezcumulus XCM/UMP testing."
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-runtime = { workspace = true }

xcm = { workspace = true }

pezcumulus-pezpallet-xcm = { workspace = true }
pezcumulus-primitives-core = { workspace = true }

[dev-dependencies]
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezcumulus-pezpallet-xcm/std",
	"pezcumulus-primitives-core/std",
	"pezframe-benchmarking/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"xcm/std",
]
try-runtime = [
	"pezcumulus-pezpallet-xcm/try-runtime",
	"pezcumulus-primitives-core/try-runtime",
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm/try-runtime",
]
runtime-benchmarks = [
	"pezcumulus-pezpallet-xcm/runtime-benchmarks",
	"pezcumulus-primitives-core/runtime-benchmarks",
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
serde = []
experimental = []
tuples-96 = []
