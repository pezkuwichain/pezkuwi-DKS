[dev-dependencies]
asset-test-pezutils = { workspace = true, default-features = true }
teyrchains-runtimes-test-utils = { workspace = true, default-features = true }

[build-dependencies]
bizinikiwi-wasm-builder = { optional = true, workspace = true, default-features = true }

