[package]
name = "pezbridge-hub-common"
version = "0.1.1"
authors.workspace = true
edition.workspace = true
description = "Bridge hub common utilities"
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
pezcumulus-primitives-core = { workspace = true }
pezframe-support = { workspace = true }
pezpallet-message-queue = { workspace = true }
pezsnowbridge-core = { workspace = true }
pezsp-core = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
xcm = { workspace = true }
xcm-builder = { workspace = true }
xcm-executor = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezcumulus-primitives-core/std",
	"pezframe-support/std",
	"pezpallet-message-queue/std",
	"pezsnowbridge-core/std",
	"pezsp-core/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"scale-info/std",
	"xcm-builder/std",
	"xcm-executor/std",
	"xcm/std",
]
runtime-benchmarks = [
	"pezcumulus-primitives-core/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezpallet-message-queue/runtime-benchmarks",
	"pezsnowbridge-core/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
	"xcm-executor/runtime-benchmarks",
	"xcm/runtime-benchmarks",
]
try-runtime = [
	"pezcumulus-primitives-core/try-runtime",
	"pezframe-support/try-runtime",
	"pezpallet-message-queue/try-runtime",
	"pezsnowbridge-core/try-runtime",
	"pezsp-runtime/try-runtime",
	"xcm-builder/try-runtime",
	"xcm-executor/try-runtime",
	"xcm/try-runtime",
]
serde = []
experimental = []
tuples-96 = []
