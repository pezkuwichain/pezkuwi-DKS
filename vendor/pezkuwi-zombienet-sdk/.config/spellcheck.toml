[hunspell]
lang = "en_US"
search_dirs = ["."]
extra_dictionaries = ["lingua.dic"]
skip_os_lookups = true
use_builtin = true

[hunspell.quirks]
# `Type`'s
# 5x
transform_regex = [
	"[><+-]",
	"^'([^\\s])'$",
	"^'s$",
	"^[0-9]+(?:\\.[0-9]*)?x$",
	"^\\+$",
]
allow_concatenation = true
allow_dashes = true
