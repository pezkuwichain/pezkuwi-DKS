[package]
name = "pezsc-sysinfo"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "A crate that provides basic hardware and software telemetry information."
documentation.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
derive_more = { workspace = true, default-features = true }
futures = { workspace = true }
libc = { workspace = true }
log = { workspace = true, default-features = true }
pezsc-telemetry = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-crypto-hashing = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
rand_pcg = { workspace = true }
regex = { workspace = true }
serde = { features = ["derive"], workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }

[dev-dependencies]
pezsp-runtime = { workspace = true, default-features = true }

[features]
runtime-benchmarks = [
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
std = ["log/std", "pezsc-telemetry/std"]
try-runtime = ["pezsp-runtime/try-runtime"]
serde = []
with-tracing = []
