[settings]
timeout = 1500

[relaychain]
default_image = "pezkuwi/pezkuwi:latest"
default_command = "pezkuwi"
chain = "pezkuwichain-local"

[[relaychain.nodes]]
name = "alice"
rpc_port = 9944
validator = true

[[relaychain.nodes]]
name = "bob"
rpc_port = 9945
validator = true

[[teyrchains]]
id = 2000
chain = "asset-hub-pezkuwichain-local"
default_command = "pezkuwi-teyrchain"
default_image = "pezkuwi/pezkuwi-teyrchain:latest"
cumulus_based = true
default_args = [
  "--force-authoring",
  "--pool-kbytes 2048000",
  "--pool-limit 500000",
  "--pool-type=fork-aware",
  "--rpc-max-connections 15000",
  "--rpc-max-response-size 150",
  "--rpc-max-subscriptions-per-connection=128000",
  "--state-pruning=1024",
  "-laura::pezcumulus=info",
  "-lbasic-authorship=info",
  "-lpeerset=info",
  "-lsub-libp2p=info",
  "-lsync=info",
  "-ltxpool=debug",
]
[teyrchains.genesis.runtimeGenesis.patch.balances]
devAccounts = [1000, 1000000000000000000, "//Sender//{}"]

[[teyrchains.collators]]
name = "charlie"
validator = false
rpc_port = 9933

[[teyrchains.collators]]
name = "dave"
validator = true
rpc_port = 9934

[[teyrchains.collators]]
name = "eve"
validator = true
rpc_port = 9935

[[teyrchains.collators]]
name = "ferdie"
validator = true
rpc_port = 9936
