[package]
description = "Bizinikiwi light network protocol"
name = "pezsc-network-light"
version = "0.33.0"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true, default-features = true }
async-channel = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
pezsc-client-api = { workspace = true, default-features = true }
pezsc-network = { workspace = true, default-features = true }
pezsc-network-types = { workspace = true, default-features = true }
pezsp-blockchain = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
prost = { workspace = true }
thiserror = { workspace = true }

[build-dependencies]
prost-build = { workspace = true }

[features]
runtime-benchmarks = [
	"pezsc-client-api/runtime-benchmarks",
	"pezsc-network/runtime-benchmarks",
	"pezsp-blockchain/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
std = [
	"log/std",
	"pezsc-client-api/std",
	"pezsc-network-types/std",
	"pezsc-network/std",
	"pezsp-blockchain/std",
]
try-runtime = [
	"pezsc-client-api/try-runtime",
	"pezsc-network/try-runtime",
	"pezsp-blockchain/try-runtime",
	"pezsp-runtime/try-runtime",
]
serde = []
