[package]
name = "pezmmr-rpc"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Node-specific RPC methods for interaction with Merkle Mountain Range pezpallet."
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true }
jsonrpsee = { features = [
	"client-core",
	"macros",
	"server-core",
], workspace = true }
pezsp-api = { workspace = true, default-features = true }
pezsp-blockchain = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-mmr-primitives = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }

[dev-dependencies]
serde_json = { workspace = true, default-features = true }

[features]
runtime-benchmarks = [
	"pezsp-api/runtime-benchmarks",
	"pezsp-blockchain/runtime-benchmarks",
	"pezsp-mmr-primitives/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
std = ["pezsp-blockchain/std"]
try-runtime = [
	"pezsp-api/try-runtime",
	"pezsp-blockchain/try-runtime",
	"pezsp-mmr-primitives/try-runtime",
	"pezsp-runtime/try-runtime",
]
serde = []
