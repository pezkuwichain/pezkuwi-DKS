[package]
name = "pezsc-consensus-pow"
version = "0.33.0"
authors.workspace = true
description = "PoW consensus algorithm for bizinikiwi"
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
futures = { workspace = true }
futures-timer = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
pezsc-client-api = { workspace = true, default-features = true }
pezsc-consensus = { workspace = true, default-features = true }
pezsp-api = { workspace = true, default-features = true }
pezsp-block-builder = { workspace = true, default-features = true }
pezsp-blockchain = { workspace = true, default-features = true }
pezsp-consensus = { workspace = true, default-features = true }
pezsp-consensus-pow = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-inherents = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
thiserror = { workspace = true }

[features]
runtime-benchmarks = [
	"pezsc-client-api/runtime-benchmarks",
	"pezsc-consensus/runtime-benchmarks",
	"pezsp-api/runtime-benchmarks",
	"pezsp-block-builder/runtime-benchmarks",
	"pezsp-blockchain/runtime-benchmarks",
	"pezsp-consensus-pow/runtime-benchmarks",
	"pezsp-consensus/runtime-benchmarks",
	"pezsp-inherents/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
std = [
	"log/std",
	"pezsc-client-api/std",
	"pezsc-consensus/std",
	"pezsp-blockchain/std",
	"pezsp-consensus/std",
	"prometheus-endpoint/std",
]
try-runtime = [
	"pezsc-client-api/try-runtime",
	"pezsc-consensus/try-runtime",
	"pezsp-api/try-runtime",
	"pezsp-block-builder/try-runtime",
	"pezsp-blockchain/try-runtime",
	"pezsp-consensus-pow/try-runtime",
	"pezsp-consensus/try-runtime",
	"pezsp-inherents/try-runtime",
	"pezsp-runtime/try-runtime",
]
serde = []
