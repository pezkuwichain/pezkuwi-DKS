[package]
name = "pezsc-consensus"
version = "0.33.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Collection of common consensus specific implementations for Bizinikiwi (client)"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
futures = { features = ["thread-pool"], workspace = true }
log = { workspace = true, default-features = true }
mockall = { workspace = true }
parking_lot = { workspace = true, default-features = true }
pezsc-client-api = { workspace = true, default-features = true }
pezsc-network-types = { workspace = true, default-features = true }
pezsc-utils = { workspace = true, default-features = true }
pezsp-blockchain = { workspace = true, default-features = true }
pezsp-consensus = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
pezsp-state-machine = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }
thiserror = { workspace = true }

[dev-dependencies]
pezsp-test-primitives = { workspace = true }

[features]
runtime-benchmarks = [
	"pezsc-client-api/runtime-benchmarks",
	"pezsp-blockchain/runtime-benchmarks",
	"pezsp-consensus/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-state-machine/runtime-benchmarks",
	"pezsp-test-primitives/runtime-benchmarks",
]
std = [
	"log/std",
	"pezsc-client-api/std",
	"pezsc-network-types/std",
	"pezsc-utils/std",
	"pezsp-blockchain/std",
	"pezsp-consensus/std",
	"prometheus-endpoint/std",
]
try-runtime = [
	"pezsc-client-api/try-runtime",
	"pezsp-blockchain/try-runtime",
	"pezsp-consensus/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-test-primitives/try-runtime",
]
serde = []
