[package]
name = "pezpallet-timestamp"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME Timestamp Module"
documentation.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive", "max-encoded-len"], workspace = true }
log = { workspace = true }
pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-inherents = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-storage = { workspace = true }
pezsp-timestamp = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

docify = { workspace = true }

[dev-dependencies]
pezsp-io = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsp-inherents/std",
	"pezsp-runtime/std",
	"pezsp-storage/std",
	"pezsp-timestamp/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezsp-inherents/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-timestamp/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezsp-inherents/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-timestamp/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
