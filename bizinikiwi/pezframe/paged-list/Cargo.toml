[package]
name = "pezpallet-paged-list"
version = "0.6.0"
description = "FRAME pezpallet that provides a paged list data structure."
authors.workspace = true
homepage.workspace = true
edition.workspace = true
license = "Apache-2.0"
repository.workspace = true
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
docify = { workspace = true }
pezframe = { workspace = true, features = ["runtime"] }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-metadata-ir = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }

[features]
default = ["std"]

std = [
	"codec/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezframe/std",
	"pezsp-metadata-ir/std",
	"scale-info/std",
]

runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezframe/runtime-benchmarks",
]

try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezframe/try-runtime",
]

frame-metadata = ["pezsp-metadata-ir"]
serde = []
experimental = []
tuples-96 = []
