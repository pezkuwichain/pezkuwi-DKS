[package]
name = "pezpallet-state-trie-migration"
version = "29.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME pezpallet migration of trie"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
bizinikiwi-state-trie-migration-rpc = { optional = true, workspace = true, default-features = true }
codec = { workspace = true }
log = { workspace = true }
pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
remote-externalities = { optional = true, workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
thousands = { optional = true, workspace = true }
zstd = { optional = true, workspace = true }

[dev-dependencies]
pezpallet-balances = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
tokio = { features = ["macros"], workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"bizinikiwi-state-trie-migration-rpc?/std",
	"codec/std",
	"log/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-balances/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-tracing/std",
	"remote-externalities?/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"bizinikiwi-state-trie-migration-rpc?/runtime-benchmarks",
	"pezframe-benchmarking",
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"remote-externalities?/runtime-benchmarks",
]
try-runtime = [
	"bizinikiwi-state-trie-migration-rpc?/try-runtime",
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezsp-runtime/try-runtime",
	"remote-externalities?/try-runtime",
]
remote-test = [
	"bizinikiwi-state-trie-migration-rpc",
	"remote-externalities",
	"serde",
	"std",
	"thousands",
	"zstd",
]
serde = [
	"codec/serde",
	"dep:serde",
	"log/serde",
	"pezframe-benchmarking?/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
experimental = []
with-tracing = []
tuples-96 = []
