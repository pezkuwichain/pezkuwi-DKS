[package]
name = "pezpallet-aura"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME AURA consensus pezpallet"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive", "max-encoded-len"], workspace = true }
log = { workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezpallet-timestamp = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-consensus-aura = { workspace = true }
pezsp-runtime = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
pezsp-core = { workspace = true }
pezsp-io = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-timestamp/std",
	"pezsp-application-crypto/std",
	"pezsp-consensus-aura/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"scale-info/std",
]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-timestamp/try-runtime",
	"pezsp-consensus-aura/try-runtime",
	"pezsp-runtime/try-runtime",
]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-timestamp/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-consensus-aura/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
