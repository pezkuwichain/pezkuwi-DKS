[package]
name = "pezframe-executive"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME executives engine"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
aquamarine = { workspace = true }
codec = { features = ["derive"], workspace = true }
log = { workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezframe-try-runtime = { optional = true, workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-tracing = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
bizinikiwi-test-runtime-client = { workspace = true }
pezpallet-balances = { workspace = true, default-features = true }
pezpallet-transaction-payment = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-inherents = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
pezsp-version = { workspace = true, default-features = true }

[features]
default = ["std"]
with-tracing = ["pezsp-io/with-tracing", "pezsp-tracing/with-tracing"]
std = [
	"bizinikiwi-test-runtime-client/std",
	"codec/std",
	"log/std",
	"pezframe-support/experimental",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezframe-try-runtime/std",
	"pezsp-core/std",
	"pezsp-inherents/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-tracing/std",
	"pezsp-version/std",
	"scale-info/std",
]
try-runtime = [
	"bizinikiwi-test-runtime-client/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezframe-try-runtime/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezpallet-transaction-payment/try-runtime",
	"pezsp-inherents/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-version/try-runtime",
]
runtime-benchmarks = [
	"bizinikiwi-test-runtime-client/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezframe-try-runtime?/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezpallet-transaction-payment/runtime-benchmarks",
	"pezsp-inherents/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-version/runtime-benchmarks",
]
serde = []
experimental = []
tuples-96 = []
