[package]
name = "pezframe-election-provider-solution-type"
version = "13.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "NPoS Solution Type"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
proc-macro = true

[dependencies]
proc-macro-crate = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { features = ["full", "visit"], workspace = true }

# Dev-dependencies with pezframe-election-provider-support moved to integration tests to break circular dependency
[dev-dependencies]
codec = { workspace = true, default-features = true }
pezsp-arithmetic = { workspace = true, default-features = true }
scale-info = { workspace = true, default-features = true }
trybuild = { workspace = true }

[features]
runtime-benchmarks = []
std = []
serde = []
