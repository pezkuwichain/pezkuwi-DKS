[package]
name = "pezpallet-nomination-pools"
version = "25.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME nomination pools pezpallet"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# parity
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

# FRAME
log = { workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-staking = { workspace = true }

# Optional: use for testing and/or fuzzing
pezpallet-balances = { optional = true, workspace = true }
pezsp-tracing = { optional = true, workspace = true }

[dev-dependencies]
pezpallet-balances = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }

[features]
default = ["std"]
fuzzing = ["pezpallet-balances", "pezsp-tracing"]
std = [
	"codec/std",
	"log/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-balances?/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-staking/std",
	"pezsp-tracing?/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-balances?/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-staking/runtime-benchmarks",
]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-balances?/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-staking/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
