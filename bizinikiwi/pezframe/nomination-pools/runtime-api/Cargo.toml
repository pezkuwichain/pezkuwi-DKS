[package]
name = "pezpallet-nomination-pools-runtime-api"
version = "23.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Runtime API for nomination-pools FRAME pezpallet"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
pezpallet-nomination-pools = { workspace = true }
pezsp-api = { workspace = true }

[features]
default = ["std"]
std = ["codec/std", "pezpallet-nomination-pools/std", "pezsp-api/std"]
runtime-benchmarks = [
	"pezpallet-nomination-pools/runtime-benchmarks",
	"pezsp-api/runtime-benchmarks",
]
try-runtime = [
	"pezpallet-nomination-pools/try-runtime",
	"pezsp-api/try-runtime",
]
serde = []
