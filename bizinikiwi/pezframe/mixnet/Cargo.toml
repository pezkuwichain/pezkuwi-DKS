[package]
description = "FRAME's mixnet pezpallet"
name = "pezpallet-mixnet"
version = "0.4.0"
license = "Apache-2.0"
authors = [
	"Kurdistan Tech Institute <info@pezkuwichain.io>",
	"Parity Technologies <admin@parity.io>",
]
edition.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive", "max-encoded-len"], workspace = true }
log = { workspace = true }
pezframe = { workspace = true, features = ["runtime"] }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-mixnet = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezframe/std",
	"pezsp-application-crypto/std",
	"pezsp-mixnet/std",
	"scale-info/std",
	"serde/std",
]
try-runtime = [
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezframe/try-runtime",
]
runtime-benchmarks = [
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezframe/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-mixnet/runtime-benchmarks",
]
serde = []
experimental = []
tuples-96 = []
