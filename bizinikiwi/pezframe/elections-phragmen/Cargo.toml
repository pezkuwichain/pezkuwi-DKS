[package]
name = "pezpallet-elections-phragmen"
version = "29.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME pezpallet based on seq-Phragmén election method."
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
log = { workspace = true }
pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-npos-elections = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-staking = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
bizinikiwi-test-utils = { workspace = true }
pezpallet-balances = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"log/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezpallet-balances/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-npos-elections/std",
	"pezsp-runtime/std",
	"pezsp-staking/std",
	"pezsp-tracing/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezpallet-balances/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-npos-elections/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-staking/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezpallet-balances/try-runtime",
	"pezsp-npos-elections/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-staking/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
