[package]
authors.workspace = true
edition.workspace = true
name = "pezpallet-message-queue"
version = "31.0.0"
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME pezpallet to queue and process messages"
documentation.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
environmental = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, features = [
	"derive",
], workspace = true, default-features = true }

pezsp-arithmetic = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-weights = { workspace = true }

pezframe-benchmarking = { optional = true, workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }

[dev-dependencies]
pezframe-support = { workspace = true, features = ["experimental"] }
pezsp-crypto-hashing = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
rand_distr = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"environmental/std",
	"log/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsp-arithmetic/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-tracing/std",
	"pezsp-weights/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezsp-runtime/try-runtime",
]
serde = [
	"codec/serde",
	"dep:serde",
	"log/serde",
	"pezframe-benchmarking?/serde",
	"pezsp-arithmetic/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"pezsp-weights/serde",
	"rand/serde",
	"rand_distr/serde",
	"scale-info/serde",
]
experimental = []
with-tracing = []
tuples-96 = []
