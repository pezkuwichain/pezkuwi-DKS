[package]
name = "pezpallet-oracle"
version = "1.0.0"
authors = [
	"Acala Developers",
	"Kurdistan Tech Institute <info@pezkuwichain.io>",
	"Parity Technologies <admin@parity.io>",
]
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME oracle pezpallet for off-chain data"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { workspace = true }

impl-trait-for-tuples = { workspace = true }
pezframe-benchmarking = { workspace = true, optional = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-io = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezframe-benchmarking?/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsp-application-crypto/std",
	"pezsp-io/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"scale-info/std",
	"serde/std",
]
runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking?/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezsp-runtime/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
