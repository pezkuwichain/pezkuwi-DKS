[package]
name = "pezframe-system-benchmarking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME System benchmarking"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
pezframe-benchmarking = { workspace = true }
pezframe-support = { workspace = true }
pezframe-system = { workspace = true }
pezsp-core = { workspace = true }
pezsp-runtime = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
pezsp-externalities = { workspace = true, default-features = true }
pezsp-io = { workspace = true, default-features = true }
pezsp-version = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezframe-benchmarking/std",
	"pezframe-support/std",
	"pezframe-system/std",
	"pezsp-core/std",
	"pezsp-runtime/std",
	"scale-info/std",
]

runtime-benchmarks = [
	"pezframe-benchmarking/runtime-benchmarks",
	"pezframe-support/runtime-benchmarks",
	"pezframe-system/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-version/runtime-benchmarks",
]
try-runtime = [
	"pezframe-benchmarking/try-runtime",
	"pezframe-support/try-runtime",
	"pezframe-system/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-version/try-runtime",
]
serde = []
experimental = []
with-tracing = []
tuples-96 = []
