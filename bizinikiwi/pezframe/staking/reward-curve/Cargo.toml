[package]
name = "pezpallet-staking-reward-curve"
version = "11.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Reward Curve for FRAME staking pezpallet"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
proc-macro = true

[dependencies]
proc-macro-crate = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { features = ["full", "visit"], workspace = true }

[dev-dependencies]
pezsp-runtime = { workspace = true, default-features = true }

[features]
runtime-benchmarks = ["pezsp-runtime/runtime-benchmarks"]
std = []
try-runtime = ["pezsp-runtime/try-runtime"]
serde = []
