[package]
name = "pezsp-runtime-interface"
version = "24.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Bizinikiwi runtime interface"
documentation.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
bytes = { workspace = true }
codec = { features = ["bytes"], workspace = true }
impl-trait-for-tuples = { workspace = true }
pezsp-externalities = { workspace = true }
pezsp-runtime-interface-proc-macro = { workspace = true, default-features = true }
pezsp-std = { workspace = true }
pezsp-storage = { workspace = true }
pezsp-tracing = { workspace = true }
pezsp-wasm-interface = { workspace = true }
static_assertions = { workspace = true, default-features = true }

[target.'cfg(all(any(target_arch = "riscv32", target_arch = "riscv64"), bizinikiwi_runtime))'.dependencies]
polkavm-derive = { workspace = true }

[dev-dependencies]
rustversion = { workspace = true }
trybuild = { workspace = true }

[features]
default = ["std"]
std = [
	"bytes/std",
	"codec/std",
	"pezsp-externalities/std",
	"pezsp-std/std",
	"pezsp-storage/std",
	"pezsp-tracing/std",
	"pezsp-wasm-interface/std",
]

# ATTENTION
#
# Only use when you know what you are doing.
#
# Disables static assertions in `impls.rs` that checks the word size. To prevent any footgun, the
# check is changed into a runtime check.
disable_target_static_assertions = []
runtime-benchmarks = []
serde = []
with-tracing = []
