[package]
name = "pezsp-version"
version = "29.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Version module for the Bizinikiwi runtime; Provides a function that returns the runtime version."
documentation.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
impl-serde = { optional = true, workspace = true }
parity-wasm = { optional = true, workspace = true }
pezsp-crypto-hashing-proc-macro = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true }
pezsp-std = { workspace = true }
pezsp-version-proc-macro = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
thiserror = { optional = true, workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"impl-serde/std",
	"parity-wasm",
	"pezsp-crypto-hashing-proc-macro/std",
	"pezsp-runtime/std",
	"pezsp-std/std",
	"pezsp-version-proc-macro/std",
	"scale-info/std",
	"serde/std",
	"thiserror",
]

# Serde support without relying on std features.
serde = [
	"codec/serde",
	"dep:serde",
	"impl-serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = [
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-version-proc-macro/runtime-benchmarks",
]
try-runtime = ["pezsp-runtime/try-runtime"]
