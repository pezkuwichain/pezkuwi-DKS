[package]
name = "pezsp-version-proc-macro"
version = "13.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Macro for defining a runtime version."
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
proc-macro = true

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true }
proc-macro-warning = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { features = ["extra-traits", "fold", "full", "visit"], workspace = true }

[dev-dependencies]
pezsp-version = { workspace = true, default-features = true }

[features]
runtime-benchmarks = ["pezsp-version/runtime-benchmarks"]
std = []
serde = []
