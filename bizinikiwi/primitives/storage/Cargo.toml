[package]
name = "pezsp-storage"
version = "19.0.0"
authors.workspace = true
edition.workspace = true
description = "Storage related primitives"
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
impl-serde = { optional = true, workspace = true }
pezsp-debug-derive = { workspace = true }
ref-cast = { workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }

[features]
default = ["std"]
std = ["codec/std", "impl-serde/std", "pezsp-debug-derive/std", "serde/std"]

# Serde support without relying on std features.
serde = ["codec/serde", "dep:serde", "impl-serde"]
