[package]
name = "pezsp-staking"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "A crate which contains primitives that are useful for implementation that uses staking approaches in general. Definitions related to sessions, slashing, etc go here."
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
impl-trait-for-tuples = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }

pezsp-core = { workspace = true }
pezsp-runtime = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezsp-core/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"serde/std",
]
runtime-benchmarks = ["pezsp-runtime/runtime-benchmarks"]
try-runtime = ["pezsp-runtime/try-runtime"]
serde = [
	"codec/serde",
	"dep:serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
