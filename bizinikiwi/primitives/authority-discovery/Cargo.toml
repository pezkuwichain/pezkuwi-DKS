[package]
name = "pezsp-authority-discovery"
version = "26.0.0"
authors.workspace = true
description = "Authority discovery primitives"
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
pezsp-api = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-runtime = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezsp-api/std",
	"pezsp-application-crypto/std",
	"pezsp-runtime/std",
	"scale-info/std",
]
serde = [
	"codec/serde",
	"pezsp-application-crypto/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = [
	"pezsp-api/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = ["pezsp-api/try-runtime", "pezsp-runtime/try-runtime"]
