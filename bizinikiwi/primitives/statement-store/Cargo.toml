[package]
name = "pezsp-statement-store"
version = "10.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "A crate which contains primitives related to the statement store"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
pezsp-api = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-core = { workspace = true }
pezsp-crypto-hashing = { workspace = true }
pezsp-externalities = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-runtime-interface = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
thiserror = { optional = true, workspace = true }

# ECIES dependencies
aes-gcm = { optional = true, workspace = true }
curve25519-dalek = { optional = true, workspace = true }
ed25519-dalek = { optional = true, workspace = true, default-features = true }
hkdf = { optional = true, workspace = true }
rand = { features = [
	"small_rng",
], optional = true, workspace = true, default-features = true }
sha2 = { optional = true, workspace = true, default-features = true }
x25519-dalek = { optional = true, features = [
	"static_secrets",
], workspace = true }

[features]
default = ["std"]
std = [
	"aes-gcm",
	"aes-gcm?/std",
	"codec/std",
	"curve25519-dalek",
	"ed25519-dalek",
	"hkdf",
	"hkdf?/std",
	"pezsp-api/std",
	"pezsp-application-crypto/std",
	"pezsp-core/std",
	"pezsp-crypto-hashing/std",
	"pezsp-externalities/std",
	"pezsp-runtime-interface/std",
	"pezsp-runtime/std",
	"rand",
	"scale-info/std",
	"sha2",
	"thiserror",
	"x25519-dalek",
]
serde = [
	"codec/serde",
	"curve25519-dalek?/serde",
	"ed25519-dalek?/serde",
	"pezsp-application-crypto/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"rand?/serde",
	"scale-info/serde",
	"x25519-dalek?/serde",
]
runtime-benchmarks = [
	"pezsp-api/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-runtime-interface/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = ["pezsp-api/try-runtime", "pezsp-runtime/try-runtime"]
