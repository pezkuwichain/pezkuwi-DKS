[package]
name = "pezsp-mmr-primitives"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Merkle Mountain Range primitives."
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
log = { workspace = true }
mmr-lib = { workspace = true, default-features = false }
pezsp-api = { workspace = true }
pezsp-core = { workspace = true }
pezsp-debug-derive = { workspace = true }
pezsp-runtime = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
thiserror = { optional = true, workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"dep:thiserror",
	"log/std",
	"mmr-lib/std",
	"pezsp-api/std",
	"pezsp-core/std",
	"pezsp-debug-derive/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"serde/std",
]

# Serde support without relying on std features.
serde = [
	"array-bytes/serde",
	"codec/serde",
	"dep:serde",
	"log/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = [
	"pezsp-api/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = ["pezsp-api/try-runtime", "pezsp-runtime/try-runtime"]
