[package]
name = "pezsp-api-test"
version = "2.0.1"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
publish = false
homepage.workspace = true
repository.workspace = true
description = "Pezkuwi SDK primitive: api test"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[dependencies]
bizinikiwi-test-runtime-client = { workspace = true }
codec = { workspace = true, default-features = true }
pezsc-block-builder = { workspace = true, default-features = true }
pezsp-api = { workspace = true, default-features = true }
pezsp-consensus = { workspace = true, default-features = true }
pezsp-externalities = { workspace = true, default-features = true }
pezsp-metadata-ir = { workspace = true, default-features = true }
pezsp-runtime = { workspace = true, default-features = true }
pezsp-state-machine = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
pezsp-version = { workspace = true, default-features = true }
rustversion = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
trybuild = { workspace = true }

[dev-dependencies]
criterion = { workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
pezsp-core = { workspace = true, default-features = true }
static_assertions = { workspace = true, default-features = true }

[features]
enable-pezstaging-api = []
disable-ui-tests = []
runtime-benchmarks = [
	"bizinikiwi-test-runtime-client/runtime-benchmarks",
	"pezsc-block-builder/runtime-benchmarks",
	"pezsp-api/runtime-benchmarks",
	"pezsp-consensus/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-state-machine/runtime-benchmarks",
	"pezsp-version/runtime-benchmarks",
]
std = [
	"bizinikiwi-test-runtime-client/std",
	"log/std",
	"pezsc-block-builder/std",
	"pezsp-consensus/std",
	"scale-info/std",
]
try-runtime = [
	"bizinikiwi-test-runtime-client/try-runtime",
	"pezsc-block-builder/try-runtime",
	"pezsp-api/try-runtime",
	"pezsp-consensus/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-version/try-runtime",
]
serde = []
with-tracing = []
