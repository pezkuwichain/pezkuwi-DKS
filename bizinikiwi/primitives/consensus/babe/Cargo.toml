[package]
name = "pezsp-consensus-babe"
version = "0.32.0"
authors.workspace = true
description = "Primitives for BABE consensus"
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { optional = true, workspace = true }
codec = { workspace = true }
pezsp-api = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-consensus-slots = { workspace = true }
pezsp-core = { workspace = true }
pezsp-inherents = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-timestamp = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }

[features]
default = ["std"]
std = [
	"async-trait",
	"codec/std",
	"pezsp-api/std",
	"pezsp-application-crypto/std",
	"pezsp-consensus-slots/std",
	"pezsp-core/std",
	"pezsp-inherents/std",
	"pezsp-runtime/std",
	"pezsp-timestamp/std",
	"scale-info/std",
	"serde/std",
]

# Serde support without relying on std features.
serde = [
	"codec/serde",
	"dep:serde",
	"pezsp-application-crypto/serde",
	"pezsp-consensus-slots/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = [
	"pezsp-api/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-consensus-slots/runtime-benchmarks",
	"pezsp-inherents/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
	"pezsp-timestamp?/runtime-benchmarks",
]
try-runtime = [
	"pezsp-api/try-runtime",
	"pezsp-inherents/try-runtime",
	"pezsp-runtime/try-runtime",
	"pezsp-timestamp?/try-runtime",
]
