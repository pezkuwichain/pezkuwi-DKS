[package]
name = "pezsp-consensus-beefy"
version = "13.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Primitives for BEEFY protocol."
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
pezsp-api = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-core = { workspace = true }
pezsp-crypto-hashing = { workspace = true }
pezsp-io = { workspace = true }
pezsp-keystore = { workspace = true }
pezsp-mmr-primitives = { workspace = true }
pezsp-runtime = { workspace = true }
pezsp-weights = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, features = ["alloc", "derive"], workspace = true }
strum = { features = ["derive"], workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
w3f-bls = { features = ["std"], workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezsp-api/std",
	"pezsp-application-crypto/std",
	"pezsp-core/std",
	"pezsp-crypto-hashing/std",
	"pezsp-io/std",
	"pezsp-keystore/std",
	"pezsp-mmr-primitives/std",
	"pezsp-runtime/std",
	"pezsp-weights/std",
	"scale-info/std",
	"serde/std",
	"strum/std",
]

# Serde support without relying on std features.
serde = [
	"array-bytes/serde",
	"codec/serde",
	"dep:serde",
	"pezsp-application-crypto/serde",
	"pezsp-core/serde",
	"pezsp-mmr-primitives/serde",
	"pezsp-runtime/serde",
	"pezsp-weights/serde",
	"scale-info/serde",
]

# This feature adds BLS crypto primitives. It should not be used in production since
# the BLS implementation and interface may still be subject to significant change.
bls-experimental = [
	"pezsp-application-crypto/bls-experimental",
	"pezsp-core/bls-experimental",
]
runtime-benchmarks = [
	"pezsp-api/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-mmr-primitives/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = [
	"pezsp-api/try-runtime",
	"pezsp-mmr-primitives/try-runtime",
	"pezsp-runtime/try-runtime",
]
experimental = []
with-tracing = []
