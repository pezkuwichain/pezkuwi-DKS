[package]
name = "pezsp-npos-elections"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "NPoS election algorithm primitives"
readme = "README.md"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
pezsp-arithmetic = { workspace = true }
pezsp-core = { workspace = true }
pezsp-runtime = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }

[dev-dependencies]
bizinikiwi-test-utils = { workspace = true }

[features]
default = ["std"]
bench = []
std = [
	"codec/std",
	"pezsp-arithmetic/std",
	"pezsp-core/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"serde/std",
]

# Serde support without relying on std features.
serde = [
	"codec/serde",
	"dep:serde",
	"pezsp-arithmetic/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = ["pezsp-runtime/runtime-benchmarks"]
try-runtime = ["pezsp-runtime/try-runtime"]
