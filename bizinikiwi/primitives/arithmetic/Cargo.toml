[package]
name = "pezsp-arithmetic"
version = "23.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Minimal fixed point arithmetic primitives and types for runtime."
documentation.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[dependencies]
codec = { features = ["derive", "max-encoded-len"], workspace = true }
docify = { workspace = true }
integer-sqrt = { workspace = true }
num-traits = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
static_assertions = { workspace = true, default-features = true }

[dev-dependencies]
criterion = { workspace = true, default-features = true }
pezsp-crypto-hashing = { workspace = true, default-features = true }
primitive-types = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"num-traits/std",
	"pezsp-crypto-hashing/std",
	"scale-info/std",
	"serde/std",
]
# Serde support without relying on std features.
serde = [
	"codec/serde",
	"dep:serde",
	"primitive-types/serde",
	"rand/serde",
	"scale-info/serde",
]
