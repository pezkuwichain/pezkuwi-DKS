[package]
name = "pezsp-runtime"
version = "31.0.1"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Runtime Modules shared primitive types."
documentation.workspace = true
readme = "README.md"
exclude = [
	"!docs/images/Pezkuwi_Logo_Horizontal_Pink_Black.png",
	"!docs/images/Pezkuwi_Logo_Horizontal_Pink_White.png",
	"docs/images/*.jpg",
	"docs/images/*.png",
	"docs/whitepaper/*.png",
]

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
bytes = { workspace = true }
codec = { features = ["derive", "max-encoded-len"], workspace = true }
docify = { workspace = true }
either = { workspace = true }
hash256-std-hasher = { workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true }
num-traits = { workspace = true }
paste = { workspace = true, default-features = true }
pez-binary-merkle-tree = { workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-arithmetic = { workspace = true }
pezsp-core = { workspace = true }
pezsp-io = { workspace = true }
pezsp-std = { workspace = true }
pezsp-trie = { workspace = true }
pezsp-weights = { workspace = true }
rand = { optional = true, workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
tracing = { workspace = true, features = ["log"], default-features = false }

simple-mermaid = { workspace = true, optional = true }
tuplex = { workspace = true, default-features = false }

[dev-dependencies]
pezsp-state-machine = { workspace = true, default-features = true }
pezsp-tracing = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
zstd = { workspace = true }

[features]
runtime-benchmarks = [
	"pez-binary-merkle-tree/runtime-benchmarks",
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-io/runtime-benchmarks",
	"pezsp-state-machine/runtime-benchmarks",
	"pezsp-trie/runtime-benchmarks",
]
try-runtime = []
default = ["std"]
std = [
	"bytes/std",
	"codec/std",
	"either/std",
	"either/use_std",
	"hash256-std-hasher/std",
	"log/std",
	"num-traits/std",
	"pez-binary-merkle-tree/std",
	"pezsp-application-crypto/std",
	"pezsp-arithmetic/std",
	"pezsp-core/std",
	"pezsp-io/std",
	"pezsp-state-machine/std",
	"pezsp-std/std",
	"pezsp-tracing/std",
	"pezsp-trie/std",
	"pezsp-weights/std",
	"rand",
	"scale-info/std",
	"serde/std",
	"simple-mermaid",
	"tracing/std",
	"tuplex/std",
]

# Serde support without relying on std features.
serde = [
	"bytes/serde",
	"codec/serde",
	"dep:serde",
	"either/serde",
	"log/serde",
	"pezsp-application-crypto/serde",
	"pezsp-arithmetic/serde",
	"pezsp-core/serde",
	"pezsp-weights/serde",
	"rand?/serde",
	"scale-info/serde",
]
experimental = []
with-tracing = []
