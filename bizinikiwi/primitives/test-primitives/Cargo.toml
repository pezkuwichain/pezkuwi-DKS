[package]
name = "pezsp-test-primitives"
version = "2.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
publish = false
description = "Pezkuwi SDK primitive: test primitives"
documentation.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
pezsp-application-crypto = { workspace = true }
pezsp-core = { workspace = true }
pezsp-runtime = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], optional = true, workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"pezsp-application-crypto/std",
	"pezsp-core/std",
	"pezsp-runtime/std",
	"scale-info/std",
	"serde/std",
]

# Serde support without relying on std features.
serde = [
	"codec/serde",
	"dep:serde",
	"pezsp-application-crypto/serde",
	"pezsp-core/serde",
	"pezsp-runtime/serde",
	"scale-info/serde",
]
runtime-benchmarks = [
	"pezsp-application-crypto/runtime-benchmarks",
	"pezsp-runtime/runtime-benchmarks",
]
try-runtime = ["pezsp-runtime/try-runtime"]
